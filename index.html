<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Sorter Pro v0.1 beta | cali72mero</title>
    <!-- JSZip für den lokalen Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #141414;
            --text-primary: #e5e5e5;
            --text-secondary: #a3a3a3;
            --accent-sfw: #22c55e;
            --accent-nsfw: #ef4444;
            --accent-blue: #3b82f6;
            --accent-undo: #737373;
            --border-color: #262626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header & Stats --- */
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.025em; }
        .brand span { font-size: 0.75rem; color: var(--text-secondary); }

        .stats-bar { display: flex; gap: 1.5rem; font-size: 0.85rem; }
        .stat-item span { color: var(--text-secondary); margin-right: 4px; }
        .stat-val { font-weight: 600; }

        /* --- Layout --- */
        main { display: flex; flex: 1; overflow: hidden; padding: 1rem; gap: 1rem; }

        .viewer-container {
            flex: 1;
            background-color: #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        #main-display {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .welcome-hero { text-align: center; max-width: 400px; }
        .welcome-hero h2 { margin-bottom: 0.5rem; color: #fff; }
        .welcome-hero p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; }

        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
        }

        /* --- Buttons & Inputs --- */
        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .btn-sfw { background-color: var(--accent-sfw); }
        .btn-nsfw { background-color: var(--accent-nsfw); }
        .btn-undo { background-color: var(--accent-undo); }
        .btn-export { background-color: var(--accent-blue); }
        .btn-ghost { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.75rem; padding: 0.5rem; }

        .upload-zone {
            border: 2px dashed var(--border-color);
            padding: 1.5rem;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent-blue); }

        /* --- Export Section --- */
        .export-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .export-small { padding: 8px; font-size: 0.75rem; margin-bottom: 0; }

        .shortcuts-hint {
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            padding: 0.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
        }

        /* --- Overlays --- */
        #loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #222;
            border-top-color: var(--accent-blue); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Image Sorter Pro</h1>
        <span>v0.1 beta | cali72mero</span>
    </div>
    
    <div class="stats-bar">
        <div class="stat-item"><span data-t="total">Gesamt:</span><span id="s-total" class="stat-val">0</span></div>
        <div class="stat-item"><span data-t="open">Offen:</span><span id="s-open" class="stat-val">0</span></div>
        <div class="stat-item"><span>SFW:</span><span id="s-sfw" class="stat-val">0</span></div>
        <div class="stat-item"><span>NSFW:</span><span id="s-nsfw" class="stat-val">0</span></div>
    </div>

    <button class="btn-ghost" onclick="dbReset()" data-t="clear">Daten löschen</button>
</header>

<main>
    <div class="viewer-container">
        <div id="welcome" class="welcome-hero">
            <h2 data-t="welcome_h">Bereit zum Sortieren?</h2>
            <p data-t="welcome_p">Wähle einen Ordner mit Bildern aus. Die Verarbeitung erfolgt vollständig lokal.</p>
        </div>
        <img id="main-display" alt="Preview">
    </div>

    <aside class="sidebar">
        <div class="card">
            <div class="upload-zone" onclick="document.getElementById('input-dir').click()">
                <p data-t="upload_t" style="font-size: 0.9rem; font-weight: 500;">Ordner auswählen</p>
                <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px;">Inkl. Unterordner</p>
                <input type="file" id="input-dir" webkitdirectory directory multiple class="hidden">
            </div>
        </div>

        <div class="card">
            <button id="b-sfw" class="btn btn-sfw" onclick="decide('sfw')" disabled>
                <span data-t="btn_sfw">SFW (Links)</span>
            </button>
            <button id="b-nsfw" class="btn btn-nsfw" onclick="decide('nsfw')" disabled>
                <span data-t="btn_nsfw">NSFW (Rechts)</span>
            </button>
            <button id="b-undo" class="btn btn-undo" onclick="undo()" disabled>
                <span data-t="btn_undo">Rückgängig (Oben)</span>
            </button>
        </div>

        <div class="card" style="margin-top: auto;">
            <p style="font-size: 0.8rem; margin-bottom: 0.75rem; font-weight: 600;" data-t="export_h">Exportieren</p>
            <button id="b-zip" class="btn btn-export" onclick="exportZip()" disabled data-t="btn_zip">ZIP (Chunked)</button>
            
            <div class="export-options">
                <button id="b-sh" class="btn btn-ghost export-small" onclick="exportScript('sh')" disabled>Skript (.sh)</button>
                <button id="b-bat" class="btn btn-ghost export-small" onclick="exportScript('bat')" disabled>Skript (.bat)</button>
            </div>
        </div>

        <div class="shortcuts-hint">
            ⬅️ SFW | ➡️ NSFW | ⬆️ Undo<br>
            <span data-t="ram_opt">Memory-Safe & Low-RAM Optimiert</span>
        </div>
    </aside>
</main>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-msg" style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary);">Verarbeite...</p>
</div>

<script>
    /* --- State Management --- */
    let files = [];
    let decisions = {}; // path -> 'sfw' | 'nsfw'
    let history = [];
    let currentIndex = -1;
    let currentObjectUrl = null;

    const i18n = {
        de: {
            total: "Gesamt:", open: "Offen:", clear: "Daten löschen",
            welcome_h: "Bereit zum Sortieren?", welcome_p: "Wähle einen Ordner aus. Die Verarbeitung erfolgt lokal.",
            upload_t: "Ordner auswählen", btn_sfw: "SFW (Links)", btn_nsfw: "NSFW (Rechts)",
            btn_undo: "Rückgängig (Oben)", export_h: "Exportieren", btn_zip: "ZIP (Chunked)",
            ram_opt: "Memory-Safe & Low-RAM Optimiert", done_h: "Alle sortiert!",
            done_p: "Nutze die Export-Optionen rechts, um deine Auswahl zu speichern.",
            msg_load: "Bilder werden indiziert...", msg_zip: "Erstelle ZIP-Paket...", confirm: "Alle Daten löschen?"
        }
    };

    /* --- Core Logic --- */
    async function handleFiles(e) {
        const raw = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        if (!raw.length) return;

        setLoader(true, i18n.de.msg_load);
        files = raw;
        decisions = {};
        history = [];
        
        updateStats();
        findNext();
        setLoader(false);
    }

    function findNext() {
        // Cleanup old memory
        if (currentObjectUrl) {
            URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = null;
        }

        currentIndex = files.findIndex(f => !decisions[f.webkitRelativePath]);
        const img = document.getElementById('main-display');
        const hero = document.getElementById('welcome');

        if (currentIndex !== -1) {
            currentObjectUrl = URL.createObjectURL(files[currentIndex]);
            img.src = currentObjectUrl;
            img.style.display = 'block';
            hero.style.display = 'none';
            setControls(false);
        } else {
            img.style.display = 'none';
            hero.style.display = 'block';
            if (files.length > 0) {
                hero.querySelector('h2').innerText = i18n.de.done_h;
                hero.querySelector('p').innerText = i18n.de.done_p;
            }
            setControls(true);
        }
    }

    function decide(tag) {
        if (currentIndex === -1) return;
        const path = files[currentIndex].webkitRelativePath;
        decisions[path] = tag;
        history.push(currentIndex);
        
        updateStats();
        findNext();
    }

    function undo() {
        if (!history.length) return;
        const lastIdx = history.pop();
        const path = files[lastIdx].webkitRelativePath;
        delete decisions[path];

        updateStats();
        findNext();
    }

    /* --- Export Logic --- */
    async function exportZip() {
        const sorted = files.filter(f => decisions[f.webkitRelativePath]);
        if (!sorted.length) return;

        setLoader(true, i18n.de.msg_zip);
        
        const CHUNK_SIZE = 250; // Files per ZIP to prevent RAM crash
        let currentChunk = 0;

        for (let i = 0; i < sorted.length; i += CHUNK_SIZE) {
            currentChunk++;
            const zip = new JSZip();
            const chunk = sorted.slice(i, i + CHUNK_SIZE);
            
            chunk.forEach(f => {
                const tag = decisions[f.webkitRelativePath];
                // Preserve structure within the tag folder
                zip.folder(tag).file(f.webkitRelativePath, f);
            });

            const blob = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bundle_${currentChunk}_${Date.now()}.zip`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        setLoader(false);
    }

    function exportScript(type) {
        let content = type === 'bat' ? "@echo off\r\nmkdir nsfw\r\nmkdir sfw\r\n" : "#!/bin/bash\nmkdir -p nsfw sfw\n";
        
        for (const f of files) {
            const tag = decisions[f.webkitRelativePath];
            if (!tag) continue;

            const path = f.webkitRelativePath;
            if (type === 'bat') {
                content += `move "${path}" "${tag}\\${path}"\r\n`;
            } else {
                content += `mkdir -p "${tag}/$(dirname "${path}")"\n`;
                content += `mv "${path}" "${tag}/${path}"\n`;
            }
        }

        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sort_files.${type}`;
        a.click();
        URL.revokeObjectURL(url);
    }

    /* --- UI Helpers --- */
    function updateStats() {
        const total = files.length;
        const solved = Object.keys(decisions).length;
        const sfw = Object.values(decisions).filter(v => v === 'sfw').length;
        const nsfw = Object.values(decisions).filter(v => v === 'nsfw').length;

        document.getElementById('s-total').innerText = total;
        document.getElementById('s-open').innerText = total - solved;
        document.getElementById('s-sfw').innerText = sfw;
        document.getElementById('s-nsfw').innerText = nsfw;

        const hasSorted = solved > 0;
        document.getElementById('b-zip').disabled = !hasSorted;
        document.getElementById('b-sh').disabled = !hasSorted;
        document.getElementById('b-bat').disabled = !hasSorted;
    }

    function setControls(disabled) {
        document.getElementById('b-sfw').disabled = disabled;
        document.getElementById('b-nsfw').disabled = disabled;
        document.getElementById('b-undo').disabled = !history.length;
    }

    function setLoader(show, msg = "") {
        const l = document.getElementById('loader');
        l.style.display = show ? 'flex' : 'none';
        document.getElementById('loader-msg').innerText = msg;
    }

    function dbReset() {
        if (confirm(i18n.de.confirm)) {
            location.reload();
        }
    }

    /* --- Keyboard Navigation --- */
    window.addEventListener('keydown', (e) => {
        if (currentIndex === -1) return;
        if (e.key === 'ArrowLeft') decide('sfw');
        if (e.key === 'ArrowRight') decide('nsfw');
        if (e.key === 'ArrowUp' || e.key === 'Backspace') undo();
    });

    document.getElementById('input-dir').addEventListener('change', handleFiles);
</script>

</body>
</html>
