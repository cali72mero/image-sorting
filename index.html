<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bild-Sortierer Pro v0.1 beta</title>
    <!-- JSZip Bibliothek für den lokalen Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-sfw: #4caf50;
            --accent-nsfw: #f44336;
            --accent-neutral: #2196f3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Ursprünglicher Header --- */
        header {
            padding: 1rem;
            background-color: var(--container-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .lang-toggle { cursor: pointer; color: var(--accent-neutral); font-weight: bold; border: 1px solid var(--accent-neutral); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        /* --- Ursprüngliches Layout --- */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .viewer-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #current-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .controls-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
        }

        .btn {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-sfw { background-color: var(--accent-sfw); }
        .btn-nsfw { background-color: var(--accent-nsfw); }
        .btn-neutral { background-color: var(--accent-neutral); }
        .btn-danger { background-color: #555; }

        .upload-area {
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: var(--container-bg);
            cursor: pointer;
        }

        .shortcuts-info {
            margin-top: auto;
            padding: 10px;
            background: #252525;
            border-radius: 5px;
            font-size: 0.8rem;
            color: #888;
        }

        /* --- Overlay --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--accent-neutral);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="header-brand">
        <div><strong>Bild-Sortierer Pro</strong> <small>v0.1 beta</small></div>
        <div id="lang-btn" class="lang-toggle" onclick="toggleLanguage()">EN</div>
    </div>
    
    <div class="stats">
        <span><span data-t="total">Gesamt</span>: <span id="stat-total">0</span></span>
        <span><span data-t="open">Offen</span>: <span id="stat-remaining">0</span></span>
        <span>SFW: <span id="stat-sfw">0</span></span>
        <span>NSFW: <span id="stat-nsfw">0</span></span>
    </div>
    <button class="btn btn-danger" onclick="clearAllData()" style="padding: 5px 10px; font-size: 0.8rem; width: auto;" data-t="btn_clear">Daten löschen</button>
</header>

<div class="main-container">
    <div class="viewer-section">
        <div id="welcome-msg" style="text-align: center; padding: 20px;">
            <h2 data-t="welcome_title">Willkommen!</h2>
            <p data-t="welcome_desc">Lade einen Ordner hoch, um mit der Sortierung zu beginnen.</p>
        </div>
        <img id="current-image" style="display: none;">
    </div>

    <div class="controls-section">
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <p data-t="upload_text">Ordner auswählen</p>
            <button class="btn btn-neutral" style="padding: 10px; font-size: 0.9rem;" data-t="btn_upload">Hochladen</button>
            <input type="file" id="file-input" webkitdirectory directory multiple style="display: none;">
        </div>

        <button id="btn-sfw" class="btn btn-sfw" onclick="sortImage('sfw')" disabled data-t="btn_sfw">SFW (S)</button>
        <button id="btn-nsfw" class="btn btn-nsfw" onclick="sortImage('nsfw')" disabled data-t="btn_nsfw">NSFW (N)</button>
        <button id="btn-undo" class="btn btn-danger" onclick="undoLast()" disabled data-t="btn_undo">Rückgängig (Z)</button>
        
        <hr style="width: 100%; border: 0; border-top: 1px solid #333; margin: 10px 0;">
        
        <button id="btn-download" class="btn btn-neutral" onclick="downloadZip()" disabled data-t="btn_zip">ZIP Herunterladen</button>

        <div class="shortcuts-info">
            <strong>Shortcuts:</strong><br>
            S = SFW | N = NSFW | Z = Undo<br>
            <span data-t="info_ram">Optimiert für wenig RAM</span>
        </div>
    </div>
</div>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text" style="margin-top: 20px;">Verarbeite Bilder...</p>
</div>

<script>
    /* --- Sprach-Management --- */
    let currentLang = 'de';
    const translations = {
        de: {
            total: "Gesamt", open: "Offen", btn_clear: "Daten löschen",
            welcome_title: "Willkommen!", welcome_desc: "Lade einen Ordner hoch, um zu beginnen.",
            upload_text: "Ordner auswählen", btn_upload: "Hochladen",
            btn_sfw: "SFW (S)", btn_nsfw: "NSFW (N)", btn_undo: "Rückgängig (Z)",
            btn_zip: "ZIP Herunterladen", info_ram: "Optimiert für wenig RAM",
            done_title: "Fertig!", done_desc: "Alle Bilder sind sortiert. Lade jetzt das ZIP herunter.",
            msg_import: "Importiere Bilder...", msg_zip: "ZIP wird erstellt...",
            confirm: "Alle Daten wirklich löschen?"
        },
        en: {
            total: "Total", open: "Open", btn_clear: "Clear Data",
            welcome_title: "Welcome!", welcome_desc: "Upload a folder to start sorting.",
            upload_text: "Select Folder", btn_upload: "Upload",
            btn_sfw: "SFW (S)", btn_nsfw: "NSFW (N)", btn_undo: "Undo (Z)",
            btn_zip: "Download ZIP", info_ram: "Low RAM optimization",
            done_title: "Done!", done_desc: "All images sorted. Download your ZIP now.",
            msg_import: "Importing images...", msg_zip: "Creating ZIP...",
            confirm: "Really clear all data?"
        }
    };

    /* --- App Logik (IndexedDB & State) --- */
    let db;
    let imageList = [];
    let currentIndex = -1;
    let history = [];

    const initDB = () => {
        const req = indexedDB.open("ImageSorterDB", 1);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains("images")) {
                d.createObjectStore("images", { keyPath: "id", autoIncrement: true });
            }
        };
        req.onsuccess = (e) => {
            db = e.target.result;
            loadFromDB();
        };
    };

    async function handleFileUpload(e) {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
        if (!files.length) return;

        showLoading(true, translations[currentLang].msg_import);
        const tx = db.transaction("images", "readwrite");
        const store = tx.objectStore("images");

        for (const f of files) {
            store.add({ name: f.name, data: f, tag: null });
        }
        
        tx.oncomplete = () => {
            loadFromDB();
            showLoading(false);
        };
    }

    function loadFromDB() {
        const tx = db.transaction("images", "readonly");
        const req = tx.objectStore("images").getAll();
        req.onsuccess = () => {
            imageList = req.result;
            updateStats();
            findNextImage();
        };
    }

    function findNextImage() {
        currentIndex = imageList.findIndex(img => img.tag === null);
        const imgEl = document.getElementById('current-image');
        const welcome = document.getElementById('welcome-msg');

        if (currentIndex !== -1) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imgEl.src = e.target.result;
                imgEl.style.display = 'block';
                welcome.style.display = 'none';
            };
            reader.readAsDataURL(imageList[currentIndex].data);
            setButtons(false);
        } else {
            imgEl.style.display = 'none';
            welcome.style.display = 'block';
            if (imageList.length > 0) {
                welcome.querySelector('h2').innerText = translations[currentLang].done_title;
                welcome.querySelector('p').innerText = translations[currentLang].done_desc;
            }
            setButtons(true);
        }
    }

    function sortImage(tag) {
        if (currentIndex === -1) return;
        const img = imageList[currentIndex];
        img.tag = tag;
        history.push(currentIndex);

        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").put(img);
        
        updateStats();
        findNextImage();
    }

    function undoLast() {
        if (!history.length) return;
        const lastIdx = history.pop();
        imageList[lastIdx].tag = null;
        
        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").put(imageList[lastIdx]);

        updateStats();
        findNextImage();
    }

    async function downloadZip() {
        showLoading(true, translations[currentLang].msg_zip);
        const zip = new JSZip();
        const sfw = zip.folder("sfw");
        const nsfw = zip.folder("nsfw");

        imageList.forEach(img => {
            if (img.tag === 'sfw') sfw.file(img.name, img.data);
            if (img.tag === 'nsfw') nsfw.file(img.name, img.data);
        });

        const blob = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `sorted_images_${Date.now()}.zip`;
        link.click();
        showLoading(false);
    }

    /* --- Hilfsfunktionen --- */
    function updateStats() {
        document.getElementById('stat-total').innerText = imageList.length;
        document.getElementById('stat-remaining').innerText = imageList.filter(i => i.tag === null).length;
        document.getElementById('stat-sfw').innerText = imageList.filter(i => i.tag === 'sfw').length;
        document.getElementById('stat-nsfw').innerText = imageList.filter(i => i.tag === 'nsfw').length;
        document.getElementById('btn-download').disabled = !imageList.some(i => i.tag !== null);
    }

    function setButtons(disabled) {
        document.getElementById('btn-sfw').disabled = disabled;
        document.getElementById('btn-nsfw').disabled = disabled;
        document.getElementById('btn-undo').disabled = !history.length;
    }

    function toggleLanguage() {
        currentLang = currentLang === 'de' ? 'en' : 'de';
        document.getElementById('lang-btn').innerText = currentLang.toUpperCase();
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            el.innerText = translations[currentLang][key];
        });
        findNextImage();
    }

    function showLoading(show, text) {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        document.getElementById('loading-text').innerText = text;
    }

    function clearAllData() {
        if (confirm(translations[currentLang].confirm)) {
            const tx = db.transaction("images", "readwrite");
            tx.objectStore("images").clear();
            tx.oncomplete = () => location.reload();
        }
    }

    /* --- Event Listener --- */
    document.getElementById('file-input').addEventListener('change', handleFileUpload);
    window.addEventListener('keydown', (e) => {
        if (currentIndex === -1) return;
        const key = e.key.toLowerCase();
        if (key === 's') sortImage('sfw');
        if (key === 'n') sortImage('nsfw');
        if (key === 'z') undoLast();
    });

    initDB();
</script>

</body>
</html>
